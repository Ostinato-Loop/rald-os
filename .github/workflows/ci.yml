name: CI

on:
  push:         { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install type dependencies only (skip wrangler — not needed for tsc)
        run: |
          npm install --save-dev typescript@5.4.5 @cloudflare/workers-types@4.20240524.0 hono@4.4.0 @supabase/supabase-js@2.43.4 --no-audit --no-fund --prefer-offline
      - name: Type check
        run: npx tsc --noEmit
