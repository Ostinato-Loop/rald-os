name: Deploy

on:
  push:    { branches: [main] }
  workflow_dispatch:

concurrency:
  group: deploy-rald-os
  cancel-in-progress: false

jobs:
  deploy:
    name: Type-check & Deploy (api.rald.cloud)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Install dependencies (yarn — avoids npm 10.9.8 crash)
        run: yarn install --ignore-scripts --non-interactive

      - name: Type check
        run: yarn run check

      - name: Deploy Worker
        run: yarn dlx wrangler@3 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RALD_JWT_SECRET:           ${{ secrets.RALD_JWT_SECRET }}

      - name: Audit log
        if: always()
        run: echo "AUDIT service=rald-os commit=${{ github.sha }} actor=${{ github.actor }} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ) status=${{ job.status }}"
